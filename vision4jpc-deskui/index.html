<!DOCTYPE html>
<html>
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8" />
    <meta name="description" content="<%= productDescription %>" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta
      name="viewport"
      content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>"
    />

    <!--定义Electron内容安全策略 (connect-src *允许任何url请求解决跨域)-->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src *; img-src *;"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="520x520"
      href="icons/favicon-520x520.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="128x128"
      href="icons/favicon-128x128.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="icons/favicon-96x96.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="icons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="icons/favicon-16x16.png"
    />
    <link rel="icon" type="image/ico" href="favicon.ico" />
    <style type="text/css">
      /* 定义加载器容器，将其居中对齐 */
      #wuhao_loader {
        position: absolute;
        top: 50%;
        left: 50%;
        -webkit-transform: translate(-50%, -50%);
        -moz-transform: translate(-50%, -50%);
        -mos-transform: translate(-50%, -50%);
        -o-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
        text-align: center;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -khtml-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        cursor: default;
      }

      /* 定义加载器文本的样式和动画 */
      .wuhao_text {
        position: absolute;
        left: -1.3em;
        top: -1.7em;
        -webkit-animation: text 2s infinite;
        -moz-animation: text 2s infinite;
        -moz-animation: text 2s infinite;
        -ms-animation: text 2s infinite;
        -o-animation: text 2s infinite;
        animation: text 2s infinite;
      }

      /* 垂直层的样式 */
      .wuhao_vertical {
        position: absolute;
        top: -1.84em;
        left: -0.4em;
        -webkit-transform: rotate(90deg);
        -moz-transform: rotate(90deg);
        -ms-transform: rotate(90deg);
        -o-transform: rotate(90deg);
        transform: rotate(90deg);
      }

      /* 水平层的样式 */
      .wuhao_horizontal {
        position: absolute;
        top: 0em;
        left: 0em;
        -webkit-transform: rotate(0deg);
        -moz-transform: rotate(0deg);
        -ms-transform: rotate(0deg);
        -o-transform: rotate(0deg);
        transform: rotate(0deg);
      }

      /* 上下镜像的圆形样式 */
      .wuhao_circlesup {
        position: absolute;
        top: -4.7em;
        right: 12.1em;
      }

      .wuhao_circlesdwn {
        position: absolute;
        top: 2.5em;
        right: -13.5em;
        -webkit-transform: rotate(180deg);
        -moz-transform: rotate(180deg);
        -ms-transform: rotate(180deg);
        -o-transform: rotate(180deg);
        transform: rotate(180deg);
      }

      /* 定义圆形的样式和动画 */
      .wuhao_circle {
        position: absolute;
        width: 15em;
        height: 15em;
        -webkit-transform: rotate(45deg);
        -moz-transform: rotate(45deg);
        -ms-transform: rotate(45deg);
        -o-transform: rotate(45deg);
        transform: rotate(45deg);
        -webkit-animation: orbit 2s infinite;
        -moz-animation: orbit 2s infinite;
        -moz-animation: orbit 2s infinite;
        -ms-animation: orbit 2s infinite;
        -o-animation: orbit 2s infinite;
        animation: orbit 2s infinite;
        z-index: 5;
      }

      .wuhao_circle:after {
        content: "";
        position: absolute;
        width: 2em;
        height: 2em;
        -webkit-border-radius: 100%;
        -moz-border-radius: 100%;
        -ms-border-radius: 100%;
        -o-border-radius: 100%;
        border-radius: 100%;
        background: #02a56f;
      }

      .wuhao_circle:nth-child(2) {
        -webkit-animation-delay: 100ms;
        -moz-animation-delay: 100ms;
        -ms-animation-delay: 100ms;
        -o-animation-delay: 100ms;
        animation-delay: 100ms;
        z-index: 4;
      }

      .wuhao_circle:nth-child(2):after {
        background: #3fbfbb;
        -webkit-transform: scale(0.8, 0.8);
        -moz-transform: scale(0.8, 0.8);
        -ms-transform: scale(0.8, 0.8);
        -o-transform: scale(0.8, 0.8);
        transform: scale(0.8, 0.8);
      }

      .wuhao_circle:nth-child(3) {
        -webkit-animation-delay: 225ms;
        -moz-animation-delay: 225ms;
        -ms-animation-delay: 225ms;
        -o-animation-delay: 225ms;
        animation-delay: 225ms;
        z-index: 3;
      }

      .wuhao_circle:nth-child(3):after {
        background: #ffd090;
        -webkit-transform: scale(0.6, 0.6);
        -moz-transform: scale(0.6, 0.6);
        -ms-transform: scale(0.6, 0.6);
        -o-transform: scale(0.6, 0.6);
        transform: scale(0.6, 0.6);
      }

      .wuhao_circle:nth-child(4) {
        -webkit-animation-delay: 350ms;
        -moz-animation-delay: 350ms;
        -ms-animation-delay: 350ms;
        -o-animation-delay: 350ms;
        animation-delay: 350ms;
        z-index: 2;
      }

      .wuhao_circle:nth-child(4):after {
        background: #ff6d37;
        -webkit-transform: scale(0.4, 0.4);
        -moz-transform: scale(0.4, 0.4);
        -ms-transform: scale(0.4, 0.4);
        -o-transform: scale(0.4, 0.4);
        transform: scale(0.4, 0.4);
      }

      .wuhao_circle:nth-child(5) {
        -webkit-animation-delay: 475ms;
        -moz-animation-delay: 475ms;
        -ms-animation-delay: 475ms;
        -o-animation-delay: 475ms;
        animation-delay: 475ms;
        z-index: 1;
      }

      .wuhao_circle:nth-child(5):after {
        background: #db2f00;
        -webkit-transform: scale(0.2, 0.2);
        -moz-transform: scale(0.2, 0.2);
        -ms-transform: scale(0.2, 0.2);
        -o-transform: scale(0.2, 0.2);
        transform: scale(0.2, 0.2);
      }

      /* 动画 */
      @-webkit-keyframes orbit {
        0% {
          -webkit-transform: rotate(45deg);
        }

        5% {
          -webkit-transform: rotate(45deg);
          -webkit-animation-timing-function: ease-out;
        }

        70% {
          -webkit-transform: rotate(405deg);
          -webkit-animation-timing-function: ease-in;
        }

        100% {
          -webkit-transform: rotate(405deg);
        }
      }

      @-moz-keyframes orbit {
        0% {
          -moz-transform: rotate(45deg);
        }

        5% {
          -moz-transform: rotate(45deg);
          -moz-animation-timing-function: ease-out;
        }

        70% {
          -moz-transform: rotate(405deg);
          -moz-animation-timing-function: ease-in;
        }

        100% {
          -moz-transform: rotate(405deg);
        }
      }
      @-ms-keyframes orbit {
        0% {
          -ms-transform: rotate(45deg);
        }

        5% {
          -ms-transform: rotate(45deg);
          -ms-animation-timing-function: ease-out;
        }

        70% {
          -ms-transform: rotate(405deg);
          -ms-animation-timing-function: ease-in;
        }

        100% {
          -ms-transform: rotate(405deg);
        }
      }

      @-o-keyframes orbit {
        0% {
          -o-transform: rotate(45deg);
        }

        5% {
          -o-transform: rotate(45deg);
          -o-animation-timing-function: ease-out;
        }

        70% {
          -o-transform: rotate(405deg);
          -o-animation-timing-function: ease-in;
        }

        100% {
          -o-transform: rotate(405deg);
        }
      }

      @keyframes orbit {
        0% {
          transform: rotate(45deg);
        }

        5% {
          transform: rotate(45deg);
          animation-timing-function: ease-out;
        }

        70% {
          transform: rotate(405deg);
          animation-timing-function: ease-in;
        }

        100% {
          transform: rotate(405deg);
        }
      }

      @-webkit-keyframes text {
        0% {
          -webkit-transform: scale(0.2, 0.2);
          -webkit-animation-timing-function: ease-out;
        }

        40%,
        60% {
          -webkit-transform: scale(1, 1);
          -webkit-animation-timing-function: ease-out;
        }

        70%,
        100% {
          -webkit-transform: scale(0.2, 0.2);
        }
      }

      @-moz-keyframes text {
        0% {
          -moz-transform: scale(0.2, 0.2);
          -moz-animation-timing-function: ease-out;
        }

        50% {
          -moz-transform: scale(1, 1);
          -moz-animation-timing-function: ease-out;
        }

        60% {
          -moz-transform: scale(1, 1);
          -moz-animation-timing-function: ease-out;
        }

        100% {
          -moz-transform: scale(0.2, 0.2);
        }
      }

      @-mos-keyframes text {
        0% {
          -mos-transform: scale(0.2, 0.2);
          -mos-animation-timing-function: ease-out;
        }

        50% {
          -mos-transform: scale(1, 1);
          -mos-animation-timing-function: ease-out;
        }

        60% {
          -mos-transform: scale(1, 1);
          -mos-animation-timing-function: ease-out;
        }

        100% {
          -mos-transform: scale(0.2, 0.2);
        }
      }

      @-o-keyframes text {
        0% {
          -o-transform: scale(0.2, 0.2);
          -o-animation-timing-function: ease-out;
        }

        50% {
          -o-transform: scale(1, 1);
          -o-animation-timing-function: ease-out;
        }

        60% {
          -o-transform: scale(1, 1);
          -o-animation-timing-function: ease-out;
        }

        100% {
          -o-transform: scale(0.2, 0.2);
        }
      }

      @keyframes text {
        0% {
          transform: scale(0.2, 0.2);
          animation-timing-function: ease-out;
        }

        50% {
          transform: scale(1, 1);
          animation-timing-function: ease-out;
        }

        60% {
          transform: scale(1, 1);
          animation-timing-function: ease-out;
        }

        100% {
          transform: scale(0.2, 0.2);
        }
      }
    </style>
  </head>
  <body>
    <div id="wuhao_loader">
      <div class="wuhao_text">loading...</div>
      <div class="wuhao_horizontal">
        <div class="wuhao_circlesup">
          <div class="wuhao_circle"></div>
          <div class="wuhao_circle"></div>
          <div class="wuhao_circle"></div>
          <div class="wuhao_circle"></div>
          <div class="wuhao_circle"></div>
        </div>
        <div class="wuhao_circlesdwn">
          <div class="wuhao_circle"></div>
          <div class="wuhao_circle"></div>
          <div class="wuhao_circle"></div>
          <div class="wuhao_circle"></div>
          <div class="wuhao_circle"></div>
        </div>
      </div>
      <div class="wuhao_vertical">
        <div class="wuhao_circlesup">
          <div class="wuhao_circle"></div>
          <div class="wuhao_circle"></div>
          <div class="wuhao_circle"></div>
          <div class="wuhao_circle"></div>
          <div class="wuhao_circle"></div>
        </div>
        <div class="wuhao_circlesdwn">
          <div class="wuhao_circle"></div>
          <div class="wuhao_circle"></div>
          <div class="wuhao_circle"></div>
          <div class="wuhao_circle"></div>
          <div class="wuhao_circle"></div>
        </div>
      </div>
    </div>
    <!-- quasar:entry-point -->
  </body>
</html>
